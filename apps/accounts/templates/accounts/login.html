{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Cryptix Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0c;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(38, 166, 154, 0.15) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(98, 126, 234, 0.15) 0%, transparent 20%);
        }
        .auth-card {
            background: rgba(22, 22, 24, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
        }
        .brand { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -1px; }
        .brand span { color: #26a69a; }
        .subtitle { color: #8b949e; margin-bottom: 2.5rem; font-size: 0.95rem; }

        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ccc; }
        .form-control {
            width: 100%;
            padding: 14px;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
            box-sizing: border-box; /* Important fix */
        }
        .form-control:focus {
            outline: none;
            border-color: #26a69a;
            box-shadow: 0 0 0 4px rgba(38, 166, 154, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #26a69a;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.2s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(38, 166, 154, 0.3); }

        .links { margin-top: 1.5rem; font-size: 0.9rem; }
        .links a { color: #26a69a; text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="brand">Cryptix<span>Pro</span></div>
        <p class="subtitle">Welcome back! Please login to your account.</p>

        <form method="POST">
            {% csrf_token %}
            
            <!-- نمایش ارورهای کلی -->
            {% if form.non_field_errors %}
                <div style="background: rgba(255, 77, 77, 0.1); color: #ff4d4d; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem;">
                    {{ form.non_field_errors.0 }}
                </div>
            {% endif %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="links">
            Don't have an account? <a href="{% url 'register' %}">Create Account</a>
        </div>
    </div>

</body>
</html>
