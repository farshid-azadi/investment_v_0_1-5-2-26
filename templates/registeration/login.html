{% extends 'base.html' %}

{% block title %}ورود به حساب{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-md p-8 space-y-8 bg-slate-800 rounded-2xl shadow-xl border border-slate-700">
        <div class="text-center">
            <h2 class="text-3xl font-bold text-white">خوش آمدید</h2>
            <p class="mt-2 text-slate-400">لطفاً وارد حساب کاربری خود شوید</p>
        </div>

        <form class="mt-8 space-y-6" method="post" action="">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="p-4 mb-4 text-sm text-red-400 bg-red-900/20 rounded-lg border border-red-900/50">
                <p>نام کاربری یا رمز عبور اشتباه است.</p>
            </div>
            {% endif %}

            <div class="space-y-4">
                <div>
                    <label for="id_username" class="sr-only">نام کاربری</label>
                    <input id="id_username" name="username" type="text" required 
                           class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200"
                           placeholder="نام کاربری">
                </div>
                <div>
                    <label for="id_password" class="sr-only">رمز عبور</label>
                    <input id="id_password" name="password" type="password" required 
                           class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-200"
                           placeholder="رمز عبور">
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="w-4 h-4 rounded border-slate-600 bg-slate-700 text-indigo-600 focus:ring-indigo-500">
                    <label for="remember-me" class="ml-2 text-slate-400">مرا به خاطر بسپار</label>
                </div>
                <a href="#" class="font-medium text-indigo-400 hover:text-indigo-300">فراموشی رمز؟</a>
            </div>

            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-200">
                ورود
            </button>
        </form>
        
        <p class="text-center text-sm text-slate-400">
            حساب کاربری ندارید؟ 
            <a href="{% url 'register' %}" class="font-medium text-indigo-400 hover:text-indigo-300">ثبت نام کنید</a>
        </p>
    </div>
</div>
{% endblock %}
