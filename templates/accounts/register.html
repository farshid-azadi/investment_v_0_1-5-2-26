{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Cryptix Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0c;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(38, 166, 154, 0.15) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(98, 126, 234, 0.15) 0%, transparent 20%);
        }
        .auth-card {
            background: rgba(22, 22, 24, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 500px; /* Wider for register */
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .brand { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -1px; }
        .brand span { color: #26a69a; }
        .subtitle { color: #8b949e; font-size: 0.95rem; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ccc; }
        
        /* استایل دادن به فیلدهای فرم جنگو */
        input {
            width: 100%;
            padding: 14px;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #26a69a;
            box-shadow: 0 0 0 4px rgba(38, 166, 154, 0.1);
        }
        .helptext { display: none; } /* مخفی کردن متون راهنمای طولانی پیش‌فرض جنگو */
        
        .error-list { color: #ff4d4d; font-size: 0.85rem; margin-top: 5px; list-style: none; padding: 0; }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: #26a69a;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: 0.2s;
        }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(38, 166, 154, 0.3); }

        .links { margin-top: 1.5rem; font-size: 0.9rem; text-align: center; }
        .links a { color: #26a69a; text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="header">
            <div class="brand">Cryptix<span>Pro</span></div>
            <p class="subtitle">Start your investment journey today.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <ul class="error-list">
                        {% for error in field.errors %}
                            <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn-register">Create Account</button>
        </form>

        <div class="links">
            Already have an account? <a href="{% url 'login' %}">Sign In</a>
        </div>
    </div>

</body>
</html>
